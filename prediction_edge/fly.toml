app = "prediction-edge"
primary_region = "iad"

[build]

[env]
  DB_PATH = "/data/prediction_edge.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "prediction_edge_data"
  destination = "/data"
